<table border="1">
    <tr>
        <th>DB_Id</th>
        <th>Name</th>
        <th>Email</th>
        <th>Password</th>
        <th>Action</th>
    </tr>
    {% for student in students %}
    <tr>
        <td>{{ student[0] }}</td>
        <td>{{ student[1] }}</td>
        <td>{{ student[2] }}</td>
        <td>{{ student[3] }}</td>
        <td><a href="/edit/{{ student[0] }}">Edit</a></td>
        <td><a href="/delete/{{ student[0] }}">Delete</a></td>
    </tr>
    {% endfor %}
</table>
