<form action='/edit/{{ student[0] }}' method='POST'>
    <input type='text' name='username' value={{ student[1] }}><br>
    <input type='email' name='email' value={{ student[2] }}><br>
    <input type='password' name='password' value={{ student[3] }}><br>
    <input type='submit' value='Update'>
</form>
